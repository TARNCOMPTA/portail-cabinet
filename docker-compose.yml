# Portail Cabinet — déploiement (app + reverse proxy HTTPS automatique).
# Personnalisation par cabinet : fichier .env à côté (voir .env.exemple) avec
# DOMAIN / PUBLIC_URL / ACME_EMAIL. Sans .env, les défauts ci-dessous s'appliquent.
services:
  app:
    build: .
    restart: unless-stopped
    init: true # tini comme PID 1 : reape les process Chromium fermes (sinon zombies <defunct>)
    environment:
      - PORT=3000
      - PUBLIC_URL=${PUBLIC_URL:-https://portail.tarncompta.fr} # base publique (OAuth/MCP : issuer + URL du connecteur)
      - NAV_TIMEOUT=60000
      # Mise à jour EN LIGNE activée : bouton « Mettre à jour » (Paramètres, admin) ou auto au boot.
      # Pour revenir au mode "git pull + rebuild" uniquement : remettre UPDATE_DISABLED=1.
      - REMOTE_BROWSER=1 # active la vue navigateur à distance (noVNC) pour la captcha
      - SCHEDULE=1 # active le planificateur (jours/heures configurables : Paramètres ▸ Planification)
      - SCHEDULE_CARPIMKO=${SCHEDULE_CARPIMKO:-1}
      - SCHEDULE_CARMF=${SCHEDULE_CARMF:-1}
    volumes:
      - ./data:/app/data # base SQLite + clé de chiffrement (à conserver/sauvegarder)
      - ./downloads:/app/downloads # documents récupérés
    expose:
      - '3000'
      - '6080'

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-portail.tarncompta.fr}
      - ACME_EMAIL=${ACME_EMAIL:-aymeric@tarncompta.fr}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # certificats Let's Encrypt (persistés)
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
